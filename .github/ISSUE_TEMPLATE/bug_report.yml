name: 🐛 버그 리포트
description: 버그를 신고합니다
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하나요?
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: 환경
      description: 브라우저 / OS 등
      placeholder: Chrome 130, Windows 11
    validations:
      required: false
