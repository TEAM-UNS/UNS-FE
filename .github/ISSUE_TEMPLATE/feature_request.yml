name: ✨ 기능 요청
description: 새 기능이나 개선을 제안합니다
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 배경 / 문제
      description: 어떤 불편이나 필요가 있나요?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 해결하면 좋을까요?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 참고
      description: 고려한 다른 방법이나 참고 자료
    validations:
      required: false
