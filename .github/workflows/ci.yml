name: CI

# PR마다 품질 게이트를 실행한다.
# develop(통합)·main(배포) 두 브랜치로 향하는 PR 모두 검사한다.
on:
  pull_request:
    branches: [develop, main]

# 같은 PR에 새 커밋이 푸시되면 진행 중인 이전 실행을 취소한다 (CI 시간 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1단계: 빠르고 저렴한 정적 검사 (서로 독립 → 병렬 실행, 빠른 피드백) ──
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  type-check:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm type-check

  unit-test:
    name: Unit Test (Vitest + RTL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  # ── 2단계: 빌드 (정적 검사를 모두 통과해야 실행) ──
  # 여기서 딱 한 번 빌드해 dist를 아티팩트로 올리고, e2e·lighthouse가 재사용한다.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  # ── 3단계: 빌드 산출물을 소비하는 값비싼 검사 (서로 병렬) ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E
        run: pnpm e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
