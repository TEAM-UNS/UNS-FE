version: 2
updates:
  # npm 패키지 (pnpm 지원)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      # minor·patch 업데이트는 PR 하나로 묶어 PR 폭탄을 방지한다 (major는 개별 PR).
      npm-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
    commit-message:
      prefix: 'chore'
      include: 'scope' # chore(deps): ... / chore(deps-dev): ...

  # GitHub Actions 버전
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
      include: 'scope'
